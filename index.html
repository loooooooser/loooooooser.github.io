<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>розмова.ua — Ukrainian Conversation Trainer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <header id="app-header">
    <div class="header-left">
      <div class="logo">розмова<span class="logo-accent">.ua</span></div>
      <div class="header-sub">Ukrainian conversation trainer</div>
    </div>
    <div class="header-right">
      <div id="progress-dots" class="progress-dots"></div>
      <div class="score-label">Score <strong id="score-val">0</strong></div>
    </div>
  </header>

  <div class="app-body">

    <div id="chat-area" class="chat-area">
      <div id="chat-end"></div>
    </div>

    <aside class="kb-sidebar">
      <div class="kb-header">
        <span class="kb-title">Keyboard</span>
        <button id="kb-toggle" class="toggle-btn">hide</button>
      </div>
      <div id="kb-body">
        <div id="kb-layout" class="kb-layout"></div>
        <div id="active-key-info" class="active-key-info" style="display:none;">
          <span id="active-en" class="active-key-en"></span>
          <span class="active-key-arrow">→</span>
          <span id="active-ua" class="active-key-ua"></span>
        </div>
        <div class="kb-note">Gold key = next letter to press</div>
      </div>
    </aside>
  </div>

  <div id="done-screen" class="done-screen" style="display:none;">
    <div class="done-emoji">🇺🇦</div>
    <div class="done-title">Розмова закінчена!</div>
    <div class="done-sub">Conversation complete</div>
    <div id="done-score" class="done-score"></div>
    <button id="restart-btn" class="restart-btn">Start over →</button>
  </div>

  <script src="data.js"></script>
  <script src="keyboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
